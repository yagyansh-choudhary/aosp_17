name: Sync e2fsprogs from AOSP

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'   # Har Sunday raat 12 baje

permissions:
  contents: write
  workflows: write

jobs:
  sync-e2fsprogs:
    runs-on: ubuntu-latest

    steps:

      # ── Exact terminal jaisa clone ─────────────────────────
      - name: 🌐 Clone AOSP (Exactly like terminal)
        run: |
          echo "🔄 Cloning AOSP e2fsprogs..."
          git clone https://android.googlesource.com/platform/external/e2fsprogs \
            -b android17-release \
            source_repo
          echo "✅ Done! Total commits: $(cd source_repo && git log --oneline | wc -l)"

      # ── Seedha AOSP push — kuch bhi extra nahi ────────────
      # android17-release branch par sirf AOSP rahega — koi bhi extra
      # file automatically delete ho jaayegi force push se!
      - name: 🚀 Push Pure AOSP to android17-release (Nothing Extra!)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd source_repo

          git remote add github \
            https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git

          echo "⬆️ Pushing exact AOSP to android17-release..."

          git push github \
            android17-release:android17-release \
            --force

          echo "✅ android17-release branch = Pure AOSP now!"

      # ── Summary ───────────────────────────────────────────
      - name: 📋 Summary
        run: |
          cd source_repo

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  ✅ Ho gaya bhai!"
          echo "  android17-release branch: Pure AOSP only"
          echo "  Total Commits: $(git log --oneline | wc -l)"
          echo "  Latest       : $(git log -1 --format='%h - %s')"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
